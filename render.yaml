# Blueprint do Render (https://render.com) — cria o serviço web e o banco Postgres gratuitos
# de uma vez só. No dashboard do Render: "New +" > "Blueprint" > conectar este repositório.
#
# Aviso: o Postgres do plano "free" do Render é temporário (expira após um período gratuito
# limitado, cerca de 30 dias — confira a data exata no dashboard ao criar). Combina com o uso
# como teste antes de migrar para a infraestrutura definitiva do Ibama; não depender disso para
# guardar dados por muito tempo sem acompanhar o aviso de expiração no painel do Render.

services:
  - type: web
    name: conselho-gestor-ibama
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn conselho_gestor.wsgi --log-file -"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DATABASE_URL
        fromDatabase:
          name: conselho-gestor-db
          property: connectionString

databases:
  - name: conselho-gestor-db
    plan: free
